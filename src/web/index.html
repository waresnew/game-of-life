<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Game of Life</title>
		<style>
		body {
			margin: 0;
		}
		#container {
			display: flex;
			gap: 2rem;
			justify-content: center;
			align-items: center;
			width: 100vw;
			height: 100vh;
		}
		#grid {
			border: 1px solid #000000;
			image-rendering: pixelated;
		}
		#controls {
			display: flex;
			flex-direction: column;
			gap: 1rem;
			align-items: center;
		}
		#display {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			width: 50%;
			align-items: center;
		}
		#stats {
			display: flex;
			gap: 2rem;
			justify-content: center;
		}
		</style>
	</head>
	<body>
		<div id="container">
			<div id="display">
				<div id="stats">
					<span id="stats-centre"></span>
					<span id="stats-zoom"></span>
					<span id="stats-cursor"></span>
				</div>
				<canvas height="500" width="500" id="grid">Game of Life grid</canvas>
			</div>
			<div id="controls">
				<input>
				<button>Submit</button>
			</div>
		</div>
		<script type="module" src="./index.ts"></script>
	</body>
</html>
