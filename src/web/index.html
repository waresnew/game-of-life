<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Game of Life</title>
		<style>
		body {
			margin: 0;
		}
		#container {
			display: flex;
			gap: 2rem;
			justify-content: center;
			align-items: center;
			width: 100vw;
			height: 100vh;
		}
		#grid {
			border: 1px solid #000000;
			image-rendering: pixelated;
		}
		#controls {
			display: flex;
			flex-direction: column;
			gap: 1rem;
			align-items: start;
			max-width: 16rem;
		}
		#display {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			width: 50%;
			align-items: center;
		}
		#stats {
			display: flex;
			gap: 2rem;
			justify-content: center;
		}
		#debug {
			display: flex;
			gap: 0.5rem;
			flex-direction: column;
			align-items: end;
		}
		#debug,
		#controls {
			flex: 0 0 200px;
		}
		</style>
	</head>
	<body>
		<div id="container">
			<div id="debug">
				<span id="debug-centre"></span>
				<span id="debug-rendered"></span>
			</div>
			<div id="display">
				<div id="stats">
					<span id="stats-cursor"></span>
					<span id="stats-zoom"></span>
					<button id="toggle-debug">Debug info</button>
				</div>
				<canvas height="500" width="500" id="grid">Game of Life grid</canvas>
			</div>
			<div id="controls">
				<input>
				<button id="submit">Submit</button>
			</div>
		</div>
		<script type="module" src="./index.ts"></script>
	</body>
</html>
