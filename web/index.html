<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Game of Life</title>
		<link
			rel="icon"
			type="image/png"
			href="./favicon/favicon-96x96.png"
			sizes="96x96"
		>
		<link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg">
		<link rel="shortcut icon" href="./favicon/favicon.ico">
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./favicon/apple-touch-icon.png"
		>
		<meta name="apple-mobile-web-app-title" content="Game of Life">
		<link rel="manifest" href="./favicon/site.webmanifest">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
		body {
			margin: 0;
		}
		#container {
			display: flex;
			gap: 2rem;
			justify-content: safe center;
			align-items: safe center;
			height: 100%;
			width: 100%;
		}
		#grid {
			border: 1px solid #000000;
			image-rendering: pixelated;
			aspect-ratio: 1 / 1;
			min-width: 200px;
			width: 100%;
			touch-action: none;
		}
		#controls {
			display: flex;
			flex-direction: column;
			gap: 1rem;
			align-items: start;
			width: 16rem;
			flex: 0 0 auto;
		}
		#display {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			align-items: center;
			flex: 1 1 auto;
			max-width: 80vmin;
		}
		#stats {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}
		#stats-display,
		#stats-world {
			display: flex;
			gap: 2rem;
		}
		#debug-content,
		#debug {
			display: flex;
			gap: 0.5rem;
			flex-direction: column;
			align-items: end;
		}
		#debug {
			width: 16rem;
			flex: 0 0 auto;
		}
		.control {
			display: flex;
			gap: 0.5rem;
		}
		span,
		button {
			display: flex;
			align-items: center;
			line-height: 1;
			white-space: nowrap;
		}
		button {
			touch-action: none;
		}
		.runtime {
			text-wrap: nowrap;
		}
		#footer {
			display: flex;
			justify-content: space-between;
			width: 100%;
			gap: 2rem;
		}
		html,
		body {
			width: 100%;
			height: 100%;
		}
		@media (pointer: fine) {
			#instructions-touch {
				display: none;
			}
		}
		@media (pointer: coarse) {
			#instructions-mouse {
				display: none;
			}
		}
		</style>
	</head>
	<body>
		<div id="container">
			<div id="debug">
				<button id="toggle-debug">Show debug info</button>
				<div id="debug-content" style="visibility: hidden;">
					<span id="debug-rendered"></span>
					<span id="debug-cache_hitrate"></span>
					<span id="debug-memory"></span>
				</div>
			</div>
			<div id="display">
				<div id="stats">
					<div id="stats-world">
						<span id="stats-generation"></span>
						<span id="stats-alive"></span>
					</div>
					<div id="stats-display">
						<span id="stats-fps"></span>
						<span id="stats-cursor"></span>
						<span id="stats-zoom"></span>
					</div>
				</div>
				<canvas id="grid">Game of Life grid</canvas>
				<div id="footer">
					<span id="instructions-mouse"
						>Left click to draw, right click to pan, scroll to zoom.</span
					>
					<span id="instructions-touch"
						>Drag with one finger to draw, two fingers to pan, pinch to zoom.</span
					>
					<a href="https://github.com/waresnew/game-of-life" target="_blank"
						>Source</a
					>
				</div>
			</div>
			<div id="controls">
				<div class="control" id="stepsize">
					<button id="stepsize-less">-</button>
					<span id="stepsize-display"></span>
					<button id="stepsize-more">+</button>
				</div>
				<div class="control" id="once">
					<button id="once-button">Run once</button>
					<span class="runtime" id="once-runtime"></span>
				</div>
				<div class="control" id="play">
					<button id="play-button">Play</button>
					<span class="runtime" id="play-runtime"></span>
				</div>
			</div>
		</div>
		<script type="module" src="./index.ts"></script>
	</body>
</html>
