<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Game of Life</title>
		<link
			rel="icon"
			type="image/png"
			href="./favicon/favicon-96x96.png"
			sizes="96x96"
		>
		<link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg">
		<link rel="shortcut icon" href="./favicon/favicon.ico">
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./favicon/apple-touch-icon.png"
		>
		<meta name="apple-mobile-web-app-title" content="Game of Life">
		<link rel="manifest" href="./favicon/site.webmanifest">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="app.css" rel="stylesheet">
		<style>
		button {
			touch-action: none;
		}
		html,
		body {
			width: 100%;
			height: 100%;
			margin: 0;
		}
		body:not(.ready) {
			visibility: hidden;
		}
		</style>
	</head>
	<body>
		<div
			class="flex gap-8 justify-center-safe items-center-safe box-border p-4 h-full w-full"
		>
			<div class="flex flex-col gap-2 items-center-safe flex-1 h-full w-full">
				<div class="flex flex-col gap-2">
					<div class="flex gap-8" id="stats-world">
						<span id="stats-generation"></span>
						<span id="stats-alive"></span>
					</div>
					<div class="flex gap-8" id="stats-display">
						<span id="stats-fps"></span>
						<span id="stats-cursor"></span>
						<span id="stats-zoom"></span>
					</div>
				</div>
				<canvas
					id="grid"
					class="border border-black [image-rendering:pixelated] min-w-50 h-full w-full touch-none"
					>Game of Life grid</canvas
				>
				<div class="flex justify-between w-full gap-8" id="footer">
					<span class="pointer-coarse:hidden"
						>Left click to draw, right click to pan, scroll to zoom.</span
					>
					<span class="pointer-fine:hidden"
						>Drag with one finger to draw, two fingers to pan, pinch to zoom.</span
					>
					<a href="https://github.com/waresnew/game-of-life" target="_blank"
						>Source</a
					>
				</div>
			</div>
			<div class="flex flex-col gap-4 items-start">
				<div class="flex gap-2 flex-col" id="patterns">
					<label for="pattern-presets">Patterns:</label>
					<select name="pattern-presets" id="pattern-dropdown">
						<option selected value="blank">Blank</option>
					</select>
					<input type="file" id="pattern-from-file" accept=".rle">
				</div>
				<div class="h-px w-full bg-zinc-300"></div>
				<div class="flex flex-col gap-2">
					<div class="flex gap-2" id="stepsize">
						<button id="stepsize-less">-</button>
						<span id="stepsize-display"></span>
						<button id="stepsize-more">+</button>
					</div>
					<div class="flex gap-2" id="once">
						<button id="once-button">Run once</button>
						<span class="text-nowrap" id="once-runtime"></span>
					</div>
					<div class="flex gap-2" id="play">
						<button id="play-button">Play</button>
						<span class="text-nowrap" id="play-runtime"></span>
					</div>
				</div>
				<div class="h-px w-full bg-zinc-300"></div>
				<div class="flex flex-col gap-1">
					<span id="debug-rendered"></span>
					<span id="debug-cache_hitrate"></span>
					<span id="debug-pool_size"></span>
				</div>
			</div>
		</div>
		<script type="module" src="./index.ts"></script>
	</body>
</html>
