<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Game of Life</title>
		<link
			rel="icon"
			type="image/png"
			href="./favicon/favicon-96x96.png"
			sizes="96x96"
		>
		<link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg">
		<link rel="shortcut icon" href="./favicon/favicon.ico">
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./favicon/apple-touch-icon.png"
		>
		<meta name="apple-mobile-web-app-title" content="Game of Life">
		<link rel="manifest" href="./favicon/site.webmanifest">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
		body {
			margin: 0;
		}
		#container {
			display: flex;
			gap: 2rem;
			justify-content: center;
			align-items: center;
			width: 100vw;
			height: 100vh;
		}
		#grid {
			border: 1px solid #000000;
			image-rendering: pixelated;
		}
		#controls {
			display: flex;
			flex-direction: column;
			gap: 1rem;
			align-items: start;
			max-width: 16rem;
		}
		#display {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
			width: 50%;
			align-items: center;
		}
		#stats {
			display: flex;
			gap: 2rem;
			justify-content: center;
		}
		#debug {
			display: flex;
			gap: 0.5rem;
			flex-direction: column;
			align-items: end;
		}
		#debug,
		#controls {
			flex: 0 0 200px;
		}
		</style>
	</head>
	<body>
		<div id="container">
			<div id="debug">
				<span id="debug-centre"></span>
				<span id="debug-rendered"></span>
			</div>
			<div id="display">
				<div id="stats">
					<span id="stats-alive"></span>
					<span id="stats-tps"></span>
					<span id="stats-cursor"></span>
					<span id="stats-zoom"></span>
					<button id="toggle-debug">Debug info</button>
				</div>
				<canvas height="500" width="500" id="grid">Game of Life grid</canvas>
			</div>
			<div id="controls">
				<label for="stepsize">Step size</label>
				<input type="number" id="stepsize" pattern="[0-9]*" value="1">
				<button id="once">Run once</button>
				<button id="play">Play</button>
			</div>
		</div>
		<script type="module" src="./index.ts"></script>
	</body>
</html>
